apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: nexus
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: identity-service-policy
  namespace: nexus
spec:
  selector:
    matchLabels:
      app: identity
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/nexus/sa/api-gateway"]
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/api/v1/*"]